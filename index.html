<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>click or die.</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="game-container">
    <div id="flash-overlay"></div>
    <div id="click-layer"></div>

    <!-- Header area -->
    <header>
      <div class="brand">
        <h1>click or die.</h1>
      </div>
      <div class="stats">
        <div class="stat"><span class="label">best</span><span class="value" id="best-score">--</span></div>
        <div class="stat"><span class="label">last</span><span class="value" id="last-score">--</span></div>
        <div class="stat"><span class="label">streak</span><span class="value" id="streak-counter">0</span></div>
      </div>
    </header>

    <!-- Center target area -->
    <main id="game-area" class="state-start">
      <div id="target-wrapper">
        <div id="target">
          <!-- refined target -->
          <div class="target-ring outer"></div>
          <div class="target-ring center-dot"></div>
        </div>
        <div id="target-status-text">one miss and it ends.</div>
      </div>
      
      <!-- Result time display -->
      <div class="result-display hidden" id="result-display">
        <div id="result-time"></div>
        <div id="result-rank"></div>
      </div>
    </main>

    <!-- Footer / controls -->
    <footer>
      <div class="level-info">
        <h2 id="level-display">level 1 // recruit</h2>
        <p id="threat-display">too easy</p>
        
        <div id="difficulty-selector-container">
          <span class="selector-label">start at</span>
          <div class="difficulty-options">
            <button class="diff-btn active" data-level="1">1</button>
            <button class="diff-btn" data-level="2">2</button>
            <button class="diff-btn" data-level="3">3</button>
            <button class="diff-btn" data-level="4">4</button>
            <button class="diff-btn" data-level="5">5</button>
          </div>
        </div>
      </div>
      
      <div class="actions">
        <div id="status-panel">ready.</div>
        <button id="main-btn">play</button>
      </div>
    </footer>
  </div>
  <script src="script.js"></script>
</body>
</html>
